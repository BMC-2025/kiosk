<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnet Safety Awareness</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --c-bg: #0a0a0c;
    --c-surface: #141418;
    --c-border: #262630;
    --c-text: #f0f0f5;
    --c-muted: #8888a0;
    --red: #ef4444;
    --orange: #f97316;
    --amber: #fbbf24;
    --green: #22c55e;
    --blue: #3b82f6;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--c-bg);
    color: var(--c-text);
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
    cursor: none;
  }

  #kiosk { width: 100vw; height: 100vh; position: relative; overflow: hidden; }

  .slide {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    opacity: 0; transform: translateX(60px);
    transition: opacity 0.55s ease, transform 0.55s ease;
    pointer-events: none;
  }
  .slide.active { opacity: 1; transform: translateX(0); pointer-events: auto; }
  .slide.exit { opacity: 0; transform: translateX(-60px); transition: opacity 0.45s ease, transform 0.45s ease; }

  /* CHROME */
  #progress-bar {
    position: fixed; bottom: 0; left: 0; height: 5px;
    background: var(--red); width: 0%; z-index: 100; opacity: 0.8;
  }
  #slide-count {
    position: fixed; bottom: 14px; right: 20px;
    font-size: 16px; color: var(--c-muted); z-index: 100; letter-spacing: 0.08em;
  }
  .nav-btn {
    position: fixed; top: 50%; transform: translateY(-50%);
    width: 56px; height: 56px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 100; color: rgba(255,255,255,0.35);
    font-size: 22px; transition: background 0.2s, color 0.2s;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.12); color: white; }
  #nav-prev { left: 16px; }
  #nav-next { right: 16px; }
  #fs-btn {
    position: fixed; top: 14px; right: 16px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
    border-radius: 6px; color: var(--c-muted); font-size: 11px;
    padding: 5px 10px; cursor: pointer; z-index: 100;
    letter-spacing: 0.06em; text-transform: uppercase;
  }
  #fs-btn:hover { background: rgba(255,255,255,0.1); color: var(--c-text); }

  /* ─── TITLE SLIDE ─── */
  .s-title {
    align-items: center; justify-content: center; text-align: center;
    padding: 60px;
    background: radial-gradient(ellipse at 50% 40%, #1a0505 0%, #0a0a0c 65%);
  }
  .title-badge {
    display: inline-flex; align-items: center; gap: 10px;
    background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3);
    border-radius: 100px; padding: 8px 20px;
    font-size: 14px; font-weight: 700; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--red); margin-bottom: 32px;
  }
  .title-badge::before { content: '⚠'; font-size: 16px; }
  .title-main {
    font-size: clamp(60px, 8vw, 110px); font-weight: 900;
    line-height: 1; letter-spacing: -0.03em;
    color: #fff; margin-bottom: 18px;
  }
  .title-main span { color: var(--red); }
  .title-sub {
    font-size: clamp(22px, 2.8vw, 34px); color: var(--c-muted);
    letter-spacing: 0.04em; margin-bottom: 52px;
  }
  .title-meta {
    display: flex; gap: 48px; justify-content: center;
    font-size: 18px; color: rgba(255,255,255,0.35);
    letter-spacing: 0.06em;
  }
  .title-meta span { color: rgba(255,255,255,0.6); }

  /* ─── HOOK SLIDE ─── */
  .s-hook {
    align-items: center; justify-content: center;
    padding: 60px 80px;
    background: radial-gradient(ellipse at 40% 55%, #1a0505 0%, #0a0a0c 70%);
  }
  .hook-eyebrow {
    font-size: 16px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--red); margin-bottom: 28px; text-align: center;
  }
  .hook-statement {
    font-size: clamp(36px, 5vw, 64px); font-weight: 800;
    line-height: 1.15; letter-spacing: -0.02em; text-align: center;
    max-width: 900px; margin-bottom: 48px;
  }
  .hook-points {
    display: flex; gap: 28px; justify-content: center; flex-wrap: wrap;
  }
  .hook-point {
    background: var(--c-surface); border: 1px solid var(--c-border);
    border-radius: 12px; padding: 20px 26px; max-width: 280px; text-align: center;
  }
  .hook-point-text { font-size: 18px; color: rgba(240,240,245,0.8); line-height: 1.45; }
  .hook-reality {
    margin-top: 40px; text-align: center;
    font-size: 20px; color: var(--amber); font-style: italic;
    padding: 16px 32px; border: 1px solid rgba(251,191,36,0.25);
    border-radius: 8px; background: rgba(251,191,36,0.06);
  }

  /* ─── TYPES SLIDE ─── */
  .s-types {
    padding: 40px 60px;
    justify-content: center;
  }
  .section-eyebrow {
    font-size: 16px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--c-muted); margin-bottom: 8px; text-align: center;
  }
  .section-title {
    font-size: clamp(32px, 4.5vw, 54px); font-weight: 800;
    letter-spacing: -0.02em; text-align: center;
    margin-bottom: 36px;
  }
  .types-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
    margin-bottom: 28px;
  }
  .type-card {
    background: var(--c-surface); border: 1px solid var(--c-border);
    border-radius: 14px; padding: 28px 24px;
    border-top: 4px solid var(--card-color, #444);
  }
  .type-icon { font-size: 40px; margin-bottom: 16px; }
  .type-name {
    font-size: 22px; font-weight: 800; color: var(--card-color, #888);
    margin-bottom: 4px;
  }
  .type-chem { font-size: 14px; color: var(--c-muted); margin-bottom: 14px; letter-spacing: 0.06em; }
  .type-body { font-size: 17px; color: rgba(240,240,245,0.8); line-height: 1.5; }
  .type-tag {
    display: inline-block; margin-top: 12px;
    font-size: 13px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; padding: 4px 12px;
    border-radius: 100px; background: rgba(239,68,68,0.15);
    color: var(--card-color, #888); border: 1px solid rgba(239,68,68,0.2);
  }
  .types-keypoint {
    text-align: center; font-size: 20px;
    color: var(--amber); padding: 16px;
    background: rgba(251,191,36,0.05); border: 1px solid rgba(251,191,36,0.2);
    border-radius: 8px;
  }

  /* ─── HAZARDS GRID SLIDE ─── */
  .s-hazards { padding: 36px 60px; justify-content: center; }
  .hazards-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
    margin-top: 28px;
  }
  .hazard-card {
    background: var(--c-surface); border: 1px solid var(--c-border);
    border-radius: 12px; padding: 22px 20px;
    display: flex; align-items: flex-start; gap: 16px;
  }
  .hazard-icon { font-size: 34px; flex-shrink: 0; line-height: 1; }
  .hazard-title { font-size: 19px; font-weight: 700; margin-bottom: 6px; }
  .hazard-body { font-size: 16px; color: var(--c-muted); line-height: 1.4; }

  /* ─── DETAIL SLIDE (most slides) ─── */
  .s-detail {
    flex-direction: row;
  }
  .detail-sidebar {
    width: 260px; min-width: 260px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 24px; position: relative; overflow: hidden;
    background: linear-gradient(170deg, var(--sidebar-color, #333) 0%, rgba(0,0,0,0.4) 100%);
  }
  .detail-sidebar::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, rgba(255,255,255,0.07) 0%, transparent 70%);
  }
  .sidebar-icon { font-size: 80px; position: relative; z-index: 1; }
  .sidebar-label {
    font-size: 16px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: rgba(255,255,255,0.8);
    text-align: center; margin-top: 12px; position: relative; z-index: 1;
  }
  .sidebar-num {
    position: absolute; bottom: 16px;
    font-size: 13px; color: rgba(255,255,255,0.35); letter-spacing: 0.1em;
    z-index: 1;
  }

  .detail-main {
    flex: 1; padding: 28px 40px 24px; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .detail-eyebrow {
    font-size: 14px; font-weight: 700; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--c-muted); margin-bottom: 8px;
  }
  .detail-headline {
    font-size: clamp(26px, 3.2vw, 40px); font-weight: 800;
    line-height: 1.2; margin-bottom: 10px; letter-spacing: -0.015em;
  }
  .detail-lead {
    font-size: 18px; color: rgba(240,240,245,0.7); line-height: 1.5;
    margin-bottom: 20px; padding-left: 14px;
    border-left: 3px solid var(--sidebar-color, #444);
    font-style: italic;
  }
  .detail-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; flex: 1; }
  .detail-col { display: flex; flex-direction: column; gap: 10px; }
  .detail-col-label {
    font-size: 13px; font-weight: 700; letter-spacing: 0.18em;
    text-transform: uppercase; margin-bottom: 4px;
  }
  .detail-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  .detail-list li {
    font-size: 18px; color: rgba(240,240,245,0.85);
    line-height: 1.4; padding-left: 20px; position: relative;
  }
  .detail-list li::before {
    content: '›'; position: absolute; left: 0;
    font-weight: 700; font-size: 22px; line-height: 1.1;
  }
  .detail-list.red li::before { color: var(--red); }
  .detail-list.amber li::before { color: var(--amber); }
  .detail-list.green li::before { color: var(--green); }
  .detail-list.blue li::before { color: var(--blue); }

  .detail-warning {
    margin-top: 14px; padding: 14px 18px;
    background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25);
    border-radius: 8px; font-size: 17px; color: var(--red);
    font-weight: 600; line-height: 1.4;
  }
  .detail-warning::before { content: '⚠  '; }

  .detail-note {
    margin-top: 14px; padding: 14px 18px;
    background: rgba(251,191,36,0.06); border: 1px solid rgba(251,191,36,0.2);
    border-radius: 8px; font-size: 17px; color: var(--amber);
    line-height: 1.4; font-style: italic;
  }

  /* ─── SNAP FORCE VISUAL SLIDE ─── */
  .s-snap {
    align-items: center; justify-content: center; text-align: center;
    padding: 50px 60px;
    background: radial-gradient(ellipse at 50% 50%, #150303 0%, #0a0a0c 70%);
  }
  .snap-eyebrow {
    font-size: 16px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--c-muted); margin-bottom: 24px;
  }
  .snap-demo {
    display: flex; align-items: center; justify-content: center;
    gap: 0; margin: 20px 0 32px; position: relative;
  }
  .snap-magnet {
    width: 100px; height: 80px; border-radius: 10px;
    background: linear-gradient(135deg, #b91c1c, #7f1d1d);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 900; color: white;
    box-shadow: 0 0 30px rgba(239,68,68,0.5);
    border: 2px solid rgba(239,68,68,0.6);
    animation: magsnap 2.5s ease-in-out infinite;
    position: relative; z-index: 2;
    letter-spacing: 0.05em;
  }
  .snap-gap {
    width: 200px; height: 4px;
    background: linear-gradient(90deg, rgba(239,68,68,0.6), transparent);
    position: relative; overflow: visible;
    animation: gapsnap 2.5s ease-in-out infinite;
  }
  .snap-gap::after {
    content: attr(data-label);
    position: absolute; top: -26px; left: 50%; transform: translateX(-50%);
    font-size: 14px; color: var(--red); font-weight: 700; letter-spacing: 0.1em;
    white-space: nowrap;
    animation: labelsnap 2.5s ease-in-out infinite;
  }
  .snap-plate {
    width: 60px; height: 120px; border-radius: 6px;
    background: linear-gradient(135deg, #374151, #1f2937);
    border: 2px solid #4b5563;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
  }
  @keyframes magsnap {
    0%, 40%  { transform: translateX(0); }
    70%      { transform: translateX(155px); }
    80%, 100%{ transform: translateX(155px); }
  }
  @keyframes gapsnap {
    0%, 40%  { width: 200px; opacity: 1; }
    70%      { width: 0px; opacity: 0; }
    80%, 100%{ width: 0px; opacity: 0; }
  }
  @keyframes labelsnap {
    0%, 40%  { opacity: 1; }
    55%      { opacity: 0; }
    100%     { opacity: 0; }
  }
  .snap-caption {
    font-size: clamp(28px, 3.8vw, 48px); font-weight: 800;
    letter-spacing: -0.02em; margin-bottom: 16px;
  }
  .snap-caption span { color: var(--red); }
  .snap-sub { font-size: 20px; color: var(--c-muted); max-width: 600px; line-height: 1.5; }
  .snap-points {
    display: flex; gap: 24px; margin-top: 28px; justify-content: center;
  }
  .snap-point {
    background: var(--c-surface); border: 1px solid var(--c-border);
    border-radius: 10px; padding: 16px 24px; font-size: 17px;
    color: rgba(240,240,245,0.8); max-width: 260px; line-height: 1.4;
  }
  .snap-point strong { color: var(--red); display: block; margin-bottom: 4px; }

  /* ─── RULES SLIDE ─── */
  .s-rules { padding: 36px 60px 28px; justify-content: center; }
  .rules-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 24px;
  }
  .rule-item {
    background: var(--c-surface); border: 1px solid var(--c-border);
    border-radius: 12px; padding: 20px 22px;
    display: flex; align-items: flex-start; gap: 16px;
    border-left: 4px solid var(--red);
  }
  .rule-num {
    font-size: 28px; font-weight: 900; color: var(--red);
    line-height: 1; flex-shrink: 0; min-width: 32px;
  }
  .rule-text { font-size: 19px; color: var(--c-text); line-height: 1.4; font-weight: 500; }

  /* ─── PPE SLIDE ─── */
  .s-ppe { padding: 36px 60px; justify-content: center; }
  .ppe-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 24px 0 20px; }
  .ppe-card {
    background: var(--c-surface); border: 1px solid var(--c-border);
    border-radius: 14px; padding: 28px 22px; text-align: center;
    border-top: 4px solid var(--ppe-color, #444);
  }
  .ppe-icon { font-size: 48px; margin-bottom: 14px; }
  .ppe-name { font-size: 21px; font-weight: 700; color: var(--ppe-color, #888); margin-bottom: 8px; }
  .ppe-status {
    display: inline-block; font-size: 13px; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
    padding: 4px 14px; border-radius: 100px;
    background: rgba(239,68,68,0.12); color: var(--red);
    border: 1px solid rgba(239,68,68,0.25); margin-bottom: 12px;
  }
  .ppe-status.rec { background: rgba(251,191,36,0.12); color: var(--amber); border-color: rgba(251,191,36,0.25); }
  .ppe-body { font-size: 16px; color: var(--c-muted); line-height: 1.4; }
  .ppe-reality {
    text-align: center; padding: 16px 24px;
    background: rgba(239,68,68,0.06); border: 1px solid rgba(239,68,68,0.2);
    border-radius: 8px; font-size: 20px; color: var(--red); font-weight: 600;
  }

  /* ─── NOT TO DO SLIDE ─── */
  .s-notdo { padding: 36px 60px; justify-content: center; }
  .notdo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 24px; }
  .notdo-item {
    background: rgba(239,68,68,0.07); border: 1px solid rgba(239,68,68,0.2);
    border-radius: 12px; padding: 20px 22px;
    display: flex; align-items: center; gap: 16px;
  }
  .notdo-x {
    width: 40px; height: 40px; flex-shrink: 0;
    background: rgba(239,68,68,0.2); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 900; color: var(--red);
  }
  .notdo-text { font-size: 20px; color: var(--c-text); line-height: 1.35; font-weight: 500; }

  /* ─── EMERGENCY SLIDE ─── */
  .s-emergency { padding: 36px 60px; justify-content: center; }
  .emergency-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 20px; }
  .emergency-col {
    background: var(--c-surface); border: 1px solid var(--c-border);
    border-radius: 14px; padding: 26px 24px;
  }
  .emergency-col.injury { border-top: 4px solid var(--red); }
  .emergency-col.eye { border-top: 4px solid var(--amber); }
  .emergency-col-title {
    font-size: 20px; font-weight: 800; margin-bottom: 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .emergency-steps { list-style: none; display: flex; flex-direction: column; gap: 12px; }
  .emergency-steps li {
    font-size: 19px; color: rgba(240,240,245,0.85);
    padding-left: 32px; position: relative; line-height: 1.4;
  }
  .emergency-steps li .step-num {
    position: absolute; left: 0; top: 0;
    width: 24px; height: 24px; border-radius: 50%;
    background: rgba(239,68,68,0.2); color: var(--red);
    font-size: 13px; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
  }
  .emergency-col.eye .step-num { background: rgba(251,191,36,0.2); color: var(--amber); }

  /* ─── ZONES SLIDE ─── */
  .s-zones { padding: 36px 60px; justify-content: center; }
  .zones-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 24px; }
  .zones-diagram {
    background: var(--c-surface); border: 1px solid var(--c-border);
    border-radius: 14px; padding: 28px; display: flex;
    flex-direction: column; align-items: center; justify-content: center;
    position: relative; min-height: 280px;
  }
  .zone-ring {
    position: absolute; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .zone-ring.outer {
    width: 240px; height: 240px;
    border: 2px dashed rgba(239,68,68,0.3);
    background: rgba(239,68,68,0.04);
  }
  .zone-ring.middle {
    width: 160px; height: 160px;
    border: 2px dashed rgba(251,191,36,0.4);
    background: rgba(251,191,36,0.06);
  }
  .zone-ring.inner {
    width: 80px; height: 80px;
    border: 2px solid rgba(239,68,68,0.6);
    background: rgba(239,68,68,0.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
  }
  .zone-label-outer {
    position: absolute; bottom: 8px; right: 8px;
    font-size: 12px; color: rgba(239,68,68,0.7); font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .zone-label-middle {
    position: absolute; bottom: 52px; right: 14px;
    font-size: 12px; color: rgba(251,191,36,0.7); font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .zones-legend { display: flex; flex-direction: column; gap: 16px; justify-content: center; }
  .zone-rule {
    background: var(--c-surface); border: 1px solid var(--c-border);
    border-radius: 10px; padding: 18px 20px;
    display: flex; align-items: center; gap: 14px;
  }
  .zone-dot {
    width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0;
  }
  .zone-rule-text { font-size: 17px; color: rgba(240,240,245,0.85); line-height: 1.4; }
  .zone-rule-title { font-size: 14px; font-weight: 700; margin-bottom: 3px; }

  /* ─── SUMMARY SLIDE ─── */
  .s-summary {
    align-items: center; justify-content: center;
    padding: 60px 80px;
    background: radial-gradient(ellipse at 50% 50%, #100808 0%, #0a0a0c 70%);
  }
  .summary-eyebrow {
    font-size: 16px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--red); margin-bottom: 28px; text-align: center;
  }
  .summary-points { display: flex; flex-direction: column; gap: 20px; max-width: 820px; }
  .summary-point {
    display: flex; align-items: flex-start; gap: 20px;
    padding: 22px 28px; border-radius: 14px;
    background: var(--c-surface); border: 1px solid var(--c-border);
    border-left: 5px solid var(--red);
  }
  .summary-icon { font-size: 32px; flex-shrink: 0; line-height: 1; }
  .summary-text { font-size: clamp(20px, 2.4vw, 28px); font-weight: 600; line-height: 1.35; }

  /* ─── CTA SLIDE ─── */
  .s-cta {
    align-items: center; justify-content: center; text-align: center;
    padding: 60px;
    background: radial-gradient(ellipse at 50% 50%, #0a1a0a 0%, #0a0a0c 65%);
  }
  .cta-eyebrow {
    font-size: 16px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--green); margin-bottom: 24px;
  }
  .cta-headline {
    font-size: clamp(38px, 5.5vw, 68px); font-weight: 900;
    letter-spacing: -0.02em; line-height: 1.1; max-width: 800px; margin-bottom: 40px;
  }

// ─── BUILD ───────────────────────────────────────────────────────
function div(cls) {
  const el = document.createElement('div');
  el.className = cls;
  return el;
}

const builders = [
  s1_title, s2_hook, s3_types, s4_hazards, s5_crush,
  s6_snap, s7_brittle, s8_rules, s9_ppe, s10_storage,
  s11_tooling, s12_pacemaker, s13_electronics, s14_lifting,
  s15_incidents, s16_notdo, s17_emergency, s18_zones,
  s19_summary, s20_cta
];

const kiosk = document.getElementById('kiosk');
const slides = builders.map(fn => { const s = fn(); kiosk.appendChild(s); return s; });

// ─── NAV ─────────────────────────────────────────────────────────
let current = 0, timer = null, rafId = null, startTime = null;
const pb = document.getElementById('progress-bar');

function updateCount() {
  document.getElementById('slide-count').textContent = `${current + 1} / ${slides.length}`;
}

function show(idx) {
  const prev = slides[current];
  prev.classList.remove('active');
  prev.classList.add('exit');
  setTimeout(() => prev.classList.remove('exit'), 550);
  current = ((idx % slides.length) + slides.length) % slides.length;
  slides[current].classList.add('active');
  updateCount();
  startTimer();
}

function go(dir) { show(current + dir); }

function startTimer() {
  clearTimeout(timer);
  cancelAnimationFrame(rafId);
  pb.style.transition = 'none';
  pb.style.width = '0%';
  startTime = performance.now();
  (function tick(now) {
    const pct = Math.min((now - startTime) / CONFIG.duration * 100, 100);
    pb.style.width = pct + '%';
    if (pct < 100) rafId = requestAnimationFrame(tick);
  })(startTime);
  timer = setTimeout(() => go(1), CONFIG.duration);
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') go(1);
  if (e.key === 'ArrowLeft') go(-1);
  if (e.key === 'f' || e.key === 'F') toggleFS();
});

let tx = 0;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 50) go(dx < 0 ? 1 : -1);
});

function toggleFS() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
  else document.exitFullscreen?.();
}

slides[0].classList.add('active');
updateCount();
startTimer();
</script>
