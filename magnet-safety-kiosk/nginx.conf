server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js|png|jpg|svg|ico|json)$ {
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # Disable caching for HTML files (admin changes should reflect immediately)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
