<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiosk Admin — Bunting Magnetics</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <header>
    <h1>Kiosk Admin</h1>
    <div class="header-actions">
      <button id="btn-preview" class="btn btn-primary">Preview Kiosk</button>
      <button id="btn-export" class="btn btn-outline">Export</button>
      <label class="btn btn-outline">
        Import
        <input type="file" id="file-import" accept=".json" hidden>
      </label>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="visitors">Visitors</button>
    <button class="tab" data-tab="safety">Safety Messages</button>
    <button class="tab" data-tab="settings">Settings</button>
  </nav>

  <!-- VISITORS TAB -->
  <section id="tab-visitors" class="tab-content active">
    <div class="add-form">
      <h2>Add Visitor</h2>
      <div class="form-row">
        <input type="text" id="v-name" placeholder="Visitor Name" required>
        <input type="text" id="v-company" placeholder="Company">
        <input type="text" id="v-host" placeholder="Host (optional)">
        <button id="btn-add-visitor" class="btn btn-primary">Add</button>
      </div>
    </div>
    <div class="list" id="visitor-list">
      <!-- Populated by JS -->
    </div>
  </section>

  <!-- SAFETY MESSAGES TAB -->
  <section id="tab-safety" class="tab-content">
    <div class="add-form">
      <h2>Add Safety Message</h2>
      <div class="form-row">
        <input type="text" id="s-icon" placeholder="Icon/Emoji" maxlength="4" style="max-width:80px">
        <input type="text" id="s-text" placeholder="Safety message text" style="flex:3">
        <button id="btn-add-safety" class="btn btn-primary">Add</button>
      </div>
    </div>
    <div class="list" id="safety-list">
      <!-- Populated by JS -->
    </div>
  </section>

  <!-- SETTINGS TAB -->
  <section id="tab-settings" class="tab-content">
    <div class="settings-form">
      <h2>Display Settings</h2>
      <div class="setting-group">
        <label for="set-rotation">Visitor Rotation Interval</label>
        <select id="set-rotation">
          <option value="15000">15 seconds</option>
          <option value="30000">30 seconds</option>
          <option value="45000">45 seconds</option>
          <option value="60000">60 seconds</option>
        </select>
      </div>
      <div class="setting-group">
        <label for="set-ticker-speed">Ticker Scroll Speed</label>
        <select id="set-ticker-speed">
          <option value="slow">Slow</option>
          <option value="medium">Medium</option>
          <option value="fast">Fast</option>
        </select>
      </div>
      <div class="setting-group">
        <label for="set-tagline">Brand Tagline</label>
        <input type="text" id="set-tagline" placeholder="Innovative Magnetic Solutions">
      </div>
      <button id="btn-save-settings" class="btn btn-primary">Save Settings</button>
    </div>
  </section>

  <script src="js/storage.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
